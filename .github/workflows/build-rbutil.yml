name: Build Rockbox Utility

# ──────────────────────────────────────────────────────────────────────────
# ARCHITECTURAL DECISIONS (preserved for future maintainers)
# ──────────────────────────────────────────────────────────────────────────
#
# 1. NATIVE BUILDS, NOT DOCKER CROSS-COMPILATION
#    Docker images exist (stateoftheartio/qt6:6.8-macos-aqt for osxcross,
#    stateoftheartio/qt6:6.8-mingw-aqt for Windows) but cross-compiled
#    macOS binaries have known limitations:
#      - macdeployqt is crippled (no hdiutil, no proper DMG)
#      - codesign is unavailable
#      - IOKit USB device access may fail at runtime
#      - Carbon framework headers may be missing from osxcross SDK
#    Native builds produce correct, fully-functional binaries.
#    Trade-off: 5 separate runner types instead of 1 Docker host.
#
# 2. macos-14, NOT macos-15
#    Carbon framework was DEPRECATED in macOS 10.8 (2012) and REMOVED
#    from the macOS 15 SDK. Two source files require Carbon:
#      utils/rbutilqt/base/ttscarbon.cpp → #include <Carbon/Carbon.h>
#      utils/rbutilqt/base/utils.cpp     → #include <Carbon/Carbon.h>
#    macos-13 = Intel x64, has Carbon → NO (need arm64)
#    macos-14 = Apple Silicon arm64, has Carbon → YES
#    macos-15 = Apple Silicon arm64, Carbon REMOVED → build fails
#    Binaries compiled against macOS 14 SDK run on macOS 15+.
#
# 3. PLATFORM-NATIVE QT INSTALLATION
#    Linux:   apt install qt6-* → Ubuntu 24.04 repos, both x64 and arm64
#    macOS:   brew install qt@6 → Homebrew, keg-only at /opt/homebrew/opt/qt@6
#    Windows: aqtinstall (pip)  → Official Qt binaries at pinned v6.8.0
#    REJECTED: jurplel/install-qt-action (opaque version mapping)
#
# 4. Qt VERSION STRATEGY
#    Linux:   Whatever Ubuntu 24.04 ships (~6.4-6.7)
#    macOS:   Whatever Homebrew ships (~6.8)
#    Windows: PINNED to 6.8.0 — last version with win64_msvc2022_arm64
#    Trade-off: Different Qt versions across platforms. Acceptable.
#
# 5. WINDOWS ARM64 RUNNER (windows-11-arm)
#    GitHub issue #14100 (May 2026): ARM64 images now fully GitHub-managed.
#    Image exists with VS 2022 Enterprise, CMake 4.3.3, MSVC ARM64 tools.
#    BUT: label absent from standard-runner README — may be paid-tier only.
#    continue-on-error: true as safety net.
#    TO VERIFY: If it provisions on free tier, remove continue-on-error.
#
# 6. RELEASE UPSERT STRATEGY
#    Delete old release + create new release (not update-in-place).
#    GitHub Releases API doesn't support atomic asset replacement.
#    gh release delete latest-builds --yes --cleanup-tag
#    gh release create latest-builds --title "Latest ..." --prerelease
#    Fixed tag 'latest-builds' = permanent stable download URL.
#
# 7. NINJA GENERATOR
#    Consistently available, faster than Make, simpler than MSBuild.
#
# 8. ARTIFACT NAMING
#    Workflow artifacts: RockboxUtility-{label}-{sha}.{ext} (per-commit)
#    Release assets:       RockboxUtility-{label}.{ext} (stable names)
#
# 9. PATH-BASED TRIGGER FILTERING
#    Only triggers on utils/**, tools/**, lib/**, or this file.
#    Firmware-only changes don't trigger CI.
#
# 10. FULL GIT CLONE
#     gitversion.cmake needs git rev-parse and git diff.
#     Shallow clone produces "N/A" version string.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
    paths:
      - 'utils/**'
      - 'tools/**'
      - 'lib/**'
      - '.github/workflows/build-rbutil.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'utils/**'
      - 'tools/**'
      - 'lib/**'
      - '.github/workflows/build-rbutil.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            ext: AppImage
            label: linux-x64

          - os: ubuntu-24.04-arm
            arch: arm64
            ext: AppImage
            label: linux-arm64

          - os: macos-14
            arch: arm64
            ext: dmg
            label: macos-arm64

          - os: windows-2025
            arch: x64
            ext: zip
            label: windows-x64

          - os: windows-11-arm
            arch: arm64
            ext: zip
            label: windows-arm64
            continue-on-error: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error || false }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ═══════════════════════════════════════════════════════════════════
      # LINUX (x64 + arm64)
      # ═══════════════════════════════════════════════════════════════════
      - name: Install Qt6 and build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-svg-dev \
            qt6-multimedia-dev \
            qt6-5compat-dev \
            libqt6svgwidgets6 \
            libgl1-mesa-dev \
            libusb-1.0-0-dev \
            ninja-build

      # On ARM64, pre-download aarch64 linuxdeploy binaries before cmake
      # configure. The deploy.cmake hardcodes x86_64 URLs and checks
      # if(EXISTS) before downloading. We place the correct-arch binaries
      # under the x86_64 filename so cmake skips the download step.
      - name: Pre-download linuxdeploy (Linux ARM64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: |
          mkdir -p build
          curl -fsSL -o build/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
          curl -fsSL -o build/linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
          chmod +x build/linuxdeploy-x86_64.AppImage build/linuxdeploy-plugin-qt-x86_64.AppImage
          echo "Pre-downloaded aarch64 linuxdeploy binaries"

      - name: CMake Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S utils -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: CMake Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: CMake Deploy (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --target deploy

      - name: Upload Artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: RockboxUtility-${{ matrix.label }}-${{ github.sha }}
          path: build/RockboxUtility.AppImage
          if-no-files-found: error

      # ═══════════════════════════════════════════════════════════════════
      # macOS (arm64)
      # ═══════════════════════════════════════════════════════════════════
      - name: Install Qt6 and Ninja (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 ninja
          echo "QT_PATH=/opt/homebrew/opt/qt@6" >> $GITHUB_ENV

      - name: CMake Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S utils -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.QT_PATH }}" \
            -G Ninja

      # Pre-create the dmgbuild Python virtualenv and stamp file to avoid
      # a ninja duplicate-output error. The deploy.cmake module is called
      # by BOTH rbutilqt/CMakeLists.txt and themeeditor/CMakeLists.txt,
      # and both try to produce ${CMAKE_BINARY_DIR}/dmgbuild.stamp — causing
      # "multiple rules generate dmgbuild.stamp" at ninja PARSE time.
      #
      # Fix: After cmake configure, patch build.ninja to remove all but
      # the first build rule that produces dmgbuild.stamp. Then deploy
      # manually with macdeployqt + dmgbuild (bypass cmake deploy target).
      - name: Patch duplicate dmgbuild.stamp in build.ninja (macOS)
        if: runner.os == 'macOS'
        run: |
          python3 << 'PYEOF'
          with open('build/build.ninja', 'r') as f:
              content = f.read()
          lines = content.split('\n')
          result = []
          dmgbuild_first_kept = False
          skip_block = False

          for line in lines:
              is_dmgbuild_build = ('dmgbuild.stamp' in line
                                   and line.lstrip().startswith('build '))
              if is_dmgbuild_build and dmgbuild_first_kept:
                  skip_block = True
                  continue
              if is_dmgbuild_build and not dmgbuild_first_kept:
                  dmgbuild_first_kept = True
                  result.append(line)
                  continue
              if skip_block:
                  if line and line[0] not in (' ', '\t'):
                      skip_block = False
                      result.append(line)
                  continue
              result.append(line)

          with open('build/build.ninja', 'w') as f:
              f.write('\n'.join(result))
          print('Patched build.ninja: removed duplicate dmgbuild.stamp rules')
          PYEOF

      - name: CMake Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --target RockboxUtility

      - name: Deploy manually (macOS)
        if: runner.os == 'macOS'
        run: |
          # Copy helper executables into app bundle (same as deploy.cmake does)
          mkdir -p build/rbutilqt/RockboxUtility.app/Contents/bin
          cp build/ipodpatcher/ipodpatcher \
             build/rbutilqt/RockboxUtility.app/Contents/bin/ || true
          cp build/sansapatcher/sansapatcher \
             build/rbutilqt/RockboxUtility.app/Contents/bin/ || true

          # Run macdeployqt to bundle Qt frameworks into the .app
          ${{ env.QT_PATH }}/bin/macdeployqt build/rbutilqt/RockboxUtility.app -verbose=1

          # Create DMG using dmgbuild (same config as deploy.cmake)
          python3 -m venv /tmp/dmgvenv
          /tmp/dmgvenv/bin/pip install -q dmgbuild
          /tmp/dmgvenv/bin/python3 -m dmgbuild \
            -s utils/rbutilqt/dmgbuild.cfg \
            -Dappbundle=build/rbutilqt/RockboxUtility.app \
            RockboxUtility build/RockboxUtility.dmg

      - name: Verify DMG (macOS)
        if: runner.os == 'macOS'
        run: ls -la build/RockboxUtility.dmg

      - name: Upload Artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: RockboxUtility-${{ matrix.label }}-${{ github.sha }}
          path: build/RockboxUtility.dmg
          if-no-files-found: error

      # ═══════════════════════════════════════════════════════════════════
      # WINDOWS (x64 + arm64)
      # ═══════════════════════════════════════════════════════════════════
      # Qt 6.8.0 via aqtinstall. Core5Compat (qt5compat) and SvgWidgets
      # (qtsvg) are NOT in the base package — must explicitly install them.
      # LinguistTools is included in the base qt6 package on Windows.
      #
      # Windows ARM64: the win64_msvc2022_arm64 architecture requires the
      # x64 desktop Qt as a base (provides moc/rcc/uic host tools). We
      # install x64 first, then arm64 on top into the same directory.
      # If arm64 packages are unavailable, the x64 fallback produces x64
      # binaries via the x64 MSVC cross-compiler on the ARM64 runner.
      - name: Install Qt6 via aqt (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install aqtinstall
          if ("${{ matrix.arch }}" -eq "arm64") {
            # Install x64 Qt first (base with host tools), then arm64 add-on
            aqt install-qt windows desktop 6.8.0 win64_msvc2022_64 -O $env:RUNNER_TEMP\Qt -m qt5compat -m qtsvg
            aqt install-qt windows desktop 6.8.0 win64_msvc2022_arm64 -O $env:RUNNER_TEMP\Qt
            echo "QT_PATH=$env:RUNNER_TEMP\Qt\6.8.0\msvc2022_arm64" >> $env:GITHUB_ENV
          } else {
            aqt install-qt windows desktop 6.8.0 win64_msvc2022_64 -O $env:RUNNER_TEMP\Qt -m qt5compat -m qtsvg
            echo "QT_PATH=$env:RUNNER_TEMP\Qt\6.8.0\msvc2022_64" >> $env:GITHUB_ENV
          }

      - name: CMake Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S utils -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="${{ env.QT_PATH }}" `
            -G Ninja

      - name: CMake Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --parallel

      - name: CMake Deploy (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --target deploy

      - name: Upload Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: RockboxUtility-${{ matrix.label }}-${{ github.sha }}
          path: build/RockboxUtility*.zip
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # RELEASE UPSERT — "Latest Rockbox Utility Builds"
  # ═══════════════════════════════════════════════════════════════════════
  release:
    needs: build
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: RockboxUtility-*
          path: release-artifacts
          merge-multiple: true

      - name: Rename to stable filenames
        run: |
          for f in release-artifacts/*; do
            [ -f "$f" ] || continue
            newname=$(echo "$f" | sed -E 's/-[0-9a-f]{7,40}//')
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
              echo "Renamed: $(basename "$f") → $(basename "$newname")"
            fi
          done
          echo "Release assets:"
          ls -la release-artifacts/

      - name: Delete existing release
        run: gh release delete latest-builds --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release with binaries
        run: |
          gh release create latest-builds \
            --title "Latest Rockbox Utility Builds" \
            --notes "$(cat <<'RELEASENOTES'
          Automated CI build from commit [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          **Build Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Branch:** ${{ github.ref_name }}

          | Platform | Architecture | Download |
          |----------|-------------|----------|
          | Linux | x64 | [RockboxUtility-linux-x64.AppImage](https://github.com/${{ github.repository }}/releases/download/latest-builds/RockboxUtility-linux-x64.AppImage) |
          | Linux | arm64 | [RockboxUtility-linux-arm64.AppImage](https://github.com/${{ github.repository }}/releases/download/latest-builds/RockboxUtility-linux-arm64.AppImage) |
          | macOS | arm64 | [RockboxUtility-macos-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/latest-builds/RockboxUtility-macos-arm64.dmg) |
          | Windows | x64 | [RockboxUtility-windows-x64.zip](https://github.com/${{ github.repository }}/releases/download/latest-builds/RockboxUtility-windows-x64.zip) |
          | Windows | arm64 | [RockboxUtility-windows-arm64.zip](https://github.com/${{ github.repository }}/releases/download/latest-builds/RockboxUtility-windows-arm64.zip) |

          > These are automated CI builds from every push. They are not signed or notarized.
          > For official releases, see the [Releases page](https://github.com/${{ github.repository }}/releases).
          RELEASENOTES
          )" \
            --prerelease \
            release-artifacts/*
        env:
          GH_TOKEN: ${{ github.token }}
