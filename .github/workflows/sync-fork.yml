name: Sync Fork

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@e905b254d56ebb367514cd05fa96bf7516bd2a5a
        with:
          # token: ${{ secrets.PERSONAL_TOKEN }}
          owner: Rockbox
          base: master
          head: master